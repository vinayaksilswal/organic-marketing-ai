version: '3.8'

services:
  admin-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: organic-marketing-ai:latest
    container_name: organic_marketing_ai
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: organic_marketing_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  arq-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: organic-marketing-ai:latest
    container_name: organic_marketing_worker
    restart: always
    command: arq worker.WorkerSettings
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  redis_data:
