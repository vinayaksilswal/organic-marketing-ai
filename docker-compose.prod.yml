version: '3.8'

services:
  admin-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: organic-marketing-ai:latest
    container_name: organic_marketing_ai
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
