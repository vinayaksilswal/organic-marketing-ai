<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: #e5e7eb; color: #333333;">
    <table width="100%" border="0" cellspacing="0" cellpadding="0" style="background-color: #e5e7eb; padding: 20px 0;">
        <tr>
            <td align="center">
                <table width="600" border="0" cellspacing="0" cellpadding="0" style="background-color: #f8f9fa; border: 1px solid #e5e7eb; overflow: hidden; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);">
                    <!-- Top Logo -->
                    <tr>
                        <td align="center" style="background-color: #111827; padding: 20px;">
                            <img src="https://quantcai.in/logo.png" alt="QuantCAI" style="height: 30px; display: block; margin: 0 auto;" onerror="this.style.display='none'">
                        </td>
                    </tr>
                    
                    <!-- Hero Section -->
                    <tr>
                        <td style="background-color: #1f2937; padding: 50px 30px; text-align: center; color: white;">
                            <h2 style="margin: 0 0 10px 0; font-size: 42px; font-weight: 900; color: #fbbf24; text-transform: uppercase;">{{ headline }}</h2>
                            <p style="margin: 0; font-size: 20px; font-weight: 300; letter-spacing: 1px;">{{ subheadline }}</p>
                        </td>
                    </tr>

                    <!-- Secondary Headline -->
                    <tr>
                        <td align="center" style="padding: 30px 40px 10px 40px;">
                            <h3 style="margin: 0; font-size: 26px; color: #dc2626; font-weight: 800;">Season's Must-Haves</h3>
                        </td>
                    </tr>

                    <!-- Product Grid (Single product featured) -->
                    <tr>
                        <td style="padding: 20px 40px 40px 40px;">
                            <table width="100%" border="0" cellspacing="0" cellpadding="0">
                                <tr>
                                    <td align="center">
                                        <div style="background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                                            <img src="{{ product_image }}" alt="{{ product_name }}" style="width: 100%; max-width: 300px; display: block; margin-bottom: 15px; border-radius: 4px;">
                                            <h4 style="margin: 0 0 10px 0; font-size: 20px; color: #111827;">{{ product_name }}</h4>
                                            <p style="margin: 0 0 15px 0; font-size: 16px; color: #4b5563; line-height: 1.5;">{{ body_copy }}</p>
                                            <p style="margin: 0; font-size: 24px; font-weight: 900; color: #dc2626;">Only ${{ "%.2f"|format(product_price) }}</p>
                                        </div>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    
                    <!-- CTA -->
                    <tr>
                        <td align="center" style="padding: 0 40px 40px 40px;">
                            <a href="{{ product_url }}" style="display: block; background-color: #dc2626; color: #ffffff; font-size: 18px; font-weight: bold; text-decoration: none; padding: 20px; border-radius: 6px; text-transform: uppercase;">{{ cta_text }}</a>
                        </td>
                    </tr>
                    
                    <!-- Footer -->
                    <tr>
                        <td align="center" style="background-color: #d1d5db; padding: 20px;">
                            <p style="margin: 0; font-size: 12px; color: #4b5563;">
                                If you are no longer interested, you can <a href="#" style="color: #4b5563; text-decoration: underline;">unsubscribe instantly</a>.
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
