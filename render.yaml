services:
  - type: web
    name: organic-marketing-ai
    env: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    region: ohio
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FB_PAGE_ACCESS_TOKEN
        sync: false
      - key: FB_PAGE_ID
        sync: false
      - key: IG_BUSINESS_ACCOUNT_ID
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ALLOWED_ORIGINS
        value: '["https://organic-marketing-ai.vercel.app"]'
